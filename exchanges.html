<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>SkillSwap PH — Exchanges</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet" />
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --blue: #2563eb;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --green: #10b981;
            --green-light: #dcfce7;
            --yellow: #f59e0b;
            --yellow-light: #fef9c3;
            --red: #ef4444;
            --red-light: #fee2e2;
            --text: #0f172a;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --bg: #f1f5f9;
            --white: #ffffff;
            --nav-h: 64px;
            --sidebar-w: 240px;
        }

        html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .topnav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h);
            background: var(--white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 16px;
        }
        .brand { display: flex; align-items: center; gap: 10px; min-width: 200px; }
        .brand-logo { width: 36px; height: 36px; border-radius: 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; }
        .brand-name { font-size: 1rem; font-weight: 800; color: var(--text); }
        .nav-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }
        .nav-btn {
            width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border);
            background: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-mid);
        }
        .nav-btn:hover { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
        .avatar-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--blue); color: white; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hamburger { display: none; }
        .layout { display: flex; margin-top: var(--nav-h); min-height: calc(100vh - var(--nav-h)); }

        .sidebar {
            width: var(--sidebar-w); background: white; border-right: 1px solid var(--border);
            position: fixed; top: var(--nav-h); left: 0; height: calc(100vh - var(--nav-h));
            overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; z-index: 50;
            transition: transform 0.3s ease;
        }
        .sidebar-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); padding: 16px 10px 6px; }
        .sidebar-label:first-child { padding-top: 0; }
        .nav-link {
            display: flex; align-items: center; gap: 10px; padding: 9px 12px;
            border-radius: 10px; font-size: 0.85rem; font-weight: 500;
            color: var(--text-mid); cursor: pointer; text-decoration: none;
        }
        .nav-link:hover { background: var(--bg); color: var(--text); }
        .nav-link.active { background: var(--blue-light); color: var(--blue); font-weight: 700; }
        .logout-btn { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
        .btn-logout {
            width: 100%; padding: 9px; border-radius: 10px; border: 1.5px solid var(--red-light);
            background: var(--red-light); color: var(--red); font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-logout:hover { background: var(--red); color: white; }

        .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px 24px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-title { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .page-sub { font-size: 0.85rem; color: var(--text-mid); margin-top: 3px; }

        .exchanges-list { display: flex; flex-direction: column; gap: 12px; }
        .exchange-card {
            background: white; border-radius: 16px; border: 1.5px solid var(--border);
            padding: 18px 20px; transition: all 0.2s;
        }
        .exchange-card:hover { border-color: var(--blue); box-shadow: 0 4px 16px rgba(37, 99, 235, 0.08); }
        .exchange-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
        .exchange-avatar {
            width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem;
        }
        .exchange-info { flex: 1; }
        .exchange-name { font-size: 1rem; font-weight: 700; color: var(--text); }
        .exchange-skill { font-size: 0.8rem; color: var(--text-mid); margin-top: 2px; }
        .exchange-date { font-size: 0.7rem; color: var(--text-light); margin-top: 4px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .status-pending { background: var(--yellow-light); color: #a16207; }
        .status-accepted { background: var(--green-light); color: #16a34a; }
        .status-completed { background: var(--blue-mid); color: var(--blue); }
        .exchange-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-accept { padding: 8px 20px; border-radius: 10px; border: none; background: var(--green-light); color: #16a34a; font-weight: 700; cursor: pointer; }
        .btn-accept:hover { background: var(--green); color: white; }
        .btn-decline { padding: 8px 20px; border-radius: 10px; border: 1.5px solid var(--red-light); background: white; color: var(--red); font-weight: 700; cursor: pointer; }
        .btn-decline:hover { background: var(--red); color: white; }
        .btn-complete { padding: 8px 20px; border-radius: 10px; border: none; background: var(--blue-mid); color: var(--blue); font-weight: 700; cursor: pointer; }
        .btn-complete:hover { background: var(--blue); color: white; }
        .btn-rate { padding: 8px 20px; border-radius: 10px; border: none; background: var(--yellow-light); color: #a16207; font-weight: 700; cursor: pointer; }
        .btn-rate:hover { background: var(--yellow); color: white; }
        .btn-edit-review { padding: 8px 20px; border-radius: 10px; border: none; background: var(--blue-light); color: var(--blue); font-weight: 700; cursor: pointer; }
        .btn-edit-review:hover { background: var(--blue); color: white; }
        .review-display { margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 10px; }
        .review-text { font-size: 0.75rem; color: var(--text-mid); }
        .review-stars { color: #fbbf24; font-size: 0.7rem; margin-bottom: 4px; }
        .review-author { font-size: 0.7rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .empty-state { text-align: center; padding: 60px; color: var(--text-light); }
        .skeleton-card { background: white; border-radius: 16px; border: 1.5px solid var(--border); padding: 18px 20px; margin-bottom: 12px; }
        .skeleton-row { height: 60px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Rating Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: all 0.2s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-container {
            background: white; border-radius: 20px; width: 90%; max-width: 450px;
            max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--text); }
        .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .rating-stars { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .star { font-size: 2rem; cursor: pointer; color: #cbd5e1; transition: color 0.2s; }
        .star:hover, .star.active { color: #fbbf24; }
        .rating-comment { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.8rem; outline: none; resize: vertical; margin-bottom: 20px; }
        .rating-comment:focus { border-color: var(--blue); }
        .btn-submit-rating { width: 100%; padding: 10px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-submit-rating:hover { background: #1d4ed8; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 16px; }
            .hamburger { display: flex; }
            .brand { min-width: unset; }
            .star { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <div id="toast"></div>
    <div id="navOverlay" onclick="toggleSidebar()"></div>

    <!-- Rating Modal -->
    <div class="modal-overlay" id="ratingModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="ratingModalTitle">⭐ Rate This Exchange</h3>
                <button class="modal-close" onclick="closeRatingModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="rating-stars" id="ratingStars">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
                <textarea id="ratingComment" class="rating-comment" rows="3" placeholder="Share your experience..."></textarea>
                <button class="btn-submit-rating" onclick="submitRating()">Submit Review</button>
            </div>
        </div>
    </div>

    <nav class="topnav">
        <button class="hamburger nav-btn" onclick="toggleSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="2" y1="5" x2="16" y2="5" /><line x1="2" y1="9" x2="16" y2="9" /><line x1="2" y1="13" x2="16" y2="13" /></svg></button>
        <div class="brand"><div class="brand-logo"><svg width="20" height="20" viewBox="0 0 28 28" fill="none"><path d="M7 9l7-5 7 5v10l-7 5-7-5V9z" fill="white" opacity="0.9" /></svg></div><span class="brand-name">SkillSwap PH</span></div>
        <div class="nav-actions"><a href="dashboard.html" class="nav-btn"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg></a>
            <a href="profile.html"><div class="avatar-btn" id="userAvatar">JD</div></a>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <p class="sidebar-label">Navigation</p>
            <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
            <a href="skills.html" class="nav-link">🔧 My Skills</a>
            <a href="matches.html" class="nav-link">🤝 Matches</a>
            <a href="exchanges.html" class="nav-link active">🔄 Exchanges</a>
            <a href="messages.html" class="nav-link">💬 Messages</a>
            <a href="profile.html" class="nav-link">👤 Profile</a>
            <div class="logout-btn"><button class="btn-logout" onclick="logout()">🚪 Log Out</button></div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div><h1 class="page-title">🤝 Skill Exchanges</h1><p class="page-sub">Track and manage your exchange requests</p></div>
            </div>
            <div class="exchanges-list" id="exchangesList">
                <div class="skeleton-card"><div class="skeleton-row" style="height: 80px;"></div></div>
                <div class="skeleton-card"><div class="skeleton-row" style="height: 80px;"></div></div>
                <div class="skeleton-card"><div class="skeleton-row" style="height: 80px;"></div></div>
            </div>
        </main>
    </div>

    <script>
        let currentRatingExchangeId = null;
        let currentReviewId = null;
        let selectedRating = 0;
        let cachedUserId = null;

        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            if (t) {
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), duration);
            } else { alert(msg); }
        }

        async function fetchCurrentUser() {
            if (cachedUserId) return { id: cachedUserId };
            const token = localStorage.getItem('access_token');
            if (!token) return null;
            try {
                const response = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) return null;
                const user = await response.json();
                cachedUserId = user.id;
                return user;
            } catch (error) {
                return null;
            }
        }

        async function fetchExchanges() {
            const token = localStorage.getItem('access_token');
            if (!token) return [];
            try {
                const response = await fetch(`${API_URL}/exchanges`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                console.error('Fetch exchanges error:', error);
                return [];
            }
        }

        async function fetchAllReviews() {
            const token = localStorage.getItem('access_token');
            if (!token) return [];
            try {
                const response = await fetch(`${API_URL}/reviews/my`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                return [];
            }
        }

        async function updateExchangeStatus(exchangeId, status) {
            const token = localStorage.getItem('access_token');
            if (!token) return false;
            try {
                const response = await fetch(`${API_URL}/exchanges/${exchangeId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: status })
                });
                return response.ok;
            } catch (error) {
                console.error('Update exchange error:', error);
                return false;
            }
        }

        async function submitReview(exchangeId, rating, comment, reviewId = null) {
            const token = localStorage.getItem('access_token');
            if (!token) return false;
            
            let url = `${API_URL}/reviews`;
            let method = 'POST';
            let body = { exchange_id: exchangeId, rating: rating, comment: comment };
            
            if (reviewId) {
                url = `${API_URL}/reviews/${reviewId}`;
                method = 'PUT';
                body = { rating: rating, comment: comment };
            }
            
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                return response.ok;
            } catch (error) {
                console.error('Submit review error:', error);
                return false;
            }
        }

        async function updateUserAvatar() {
            const user = await fetchCurrentUser();
            if (user) {
                const avatar = document.getElementById('userAvatar');
                if (avatar) avatar.textContent = (user.username || 'US').slice(0, 2).toUpperCase();
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'Date TBD';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getStatusClass(status) {
            if (status === 'pending') return 'status-pending';
            if (status === 'accepted') return 'status-accepted';
            if (status === 'completed') return 'status-completed';
            return 'status-pending';
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return stars;
        }

        function openRatingModal(exchangeId, reviewId = null, existingRating = 0, existingComment = '') {
            currentRatingExchangeId = exchangeId;
            currentReviewId = reviewId;
            selectedRating = existingRating;
            
            const modalTitle = document.getElementById('ratingModalTitle');
            modalTitle.textContent = reviewId ? '✏️ Edit Your Review' : '⭐ Rate This Exchange';
            
            document.getElementById('ratingComment').value = existingComment || '';
            
            document.querySelectorAll('#ratingStars .star').forEach(star => {
                const ratingVal = parseInt(star.dataset.rating);
                if (ratingVal <= selectedRating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
            
            document.getElementById('ratingModal').classList.add('show');
        }

        function closeRatingModal() {
            document.getElementById('ratingModal').classList.remove('show');
            currentRatingExchangeId = null;
            currentReviewId = null;
            selectedRating = 0;
        }

        async function submitRating() {
            if (selectedRating === 0) {
                showToast('Please select a rating');
                return;
            }
            const comment = document.getElementById('ratingComment').value;
            const success = await submitReview(currentRatingExchangeId, selectedRating, comment, currentReviewId);
            if (success) {
                showToast(currentReviewId ? '✅ Review updated!' : '✅ Review submitted!');
                closeRatingModal();
                await renderExchanges();
            } else {
                showToast('❌ Failed to submit review');
            }
        }

        async function renderExchanges() {
            const container = document.getElementById('exchangesList');
            container.innerHTML = '<div class="skeleton-card"><div class="skeleton-row" style="height: 80px;"></div></div><div class="skeleton-card"><div class="skeleton-row" style="height: 80px;"></div></div>';
            
            const [exchanges, reviews, currentUser] = await Promise.all([
                fetchExchanges(),
                fetchAllReviews(),
                fetchCurrentUser()
            ]);
            
            if (!exchanges.length) {
                container.innerHTML = '<div class="empty-state">📭 No exchanges yet. Go to Matches to send requests!</div>';
                return;
            }
            
            const userId = currentUser?.id;
            const reviewsMap = new Map();
            reviews.forEach(review => {
                reviewsMap.set(review.exchange_id, review);
            });
            
            let html = '';
            for (const ex of exchanges) {
                const isRequester = ex.requester_id === userId;
                const otherUser = isRequester ? ex.provider_name : ex.requester_name;
                const otherInitials = (otherUser || 'U').slice(0, 2).toUpperCase();
                const review = reviewsMap.get(ex.id);
                const hasReview = !!review;
                const isMyReview = hasReview && review.reviewer_id === userId;
                
                let actions = '';
                if (ex.status === 'pending') {
                    if (!isRequester) {
                        actions = `<div class="exchange-actions">
                            <button class="btn-accept" onclick="handleUpdate(${ex.id}, 'accepted')">✓ Accept</button>
                            <button class="btn-decline" onclick="handleUpdate(${ex.id}, 'declined')">✗ Decline</button>
                        </div>`;
                    } else {
                        actions = `<div class="exchange-actions">
                            <span style="font-size:0.7rem;color:var(--text-light);">Waiting for response...</span>
                        </div>`;
                    }
                } else if (ex.status === 'accepted') {
                    actions = `<div class="exchange-actions">
                        <button class="btn-complete" onclick="handleUpdate(${ex.id}, 'completed')">✓ Mark Complete</button>
                    </div>`;
                } else if (ex.status === 'completed') {
                    if (!hasReview) {
                        actions = `<div class="exchange-actions">
                            <button class="btn-rate" onclick="openRatingModal(${ex.id})">⭐ Rate Now</button>
                        </div>`;
                    } else if (isMyReview) {
                        actions = `<div class="exchange-actions">
                            <button class="btn-edit-review" onclick='openRatingModal(${ex.id}, ${review.id}, ${review.rating}, ${JSON.stringify(review.comment || '')})'>✏️ Edit Review</button>
                        </div>
                        <div class="review-display">
                            <div class="review-author">Your Review:</div>
                            <div class="review-stars">${renderStars(review.rating)}</div>
                            <div class="review-text">"${escapeHtml(review.comment || 'No comment')}"</div>
                        </div>`;
                    } else {
                        actions = `<div class="review-display">
                            <div class="review-author">${escapeHtml(review.reviewer_name || 'User')}'s Review:</div>
                            <div class="review-stars">${renderStars(review.rating)}</div>
                            <div class="review-text">"${escapeHtml(review.comment || 'No comment')}"</div>
                        </div>`;
                    }
                }
                
                html += `
                    <div class="exchange-card">
                        <div class="exchange-header">
                            <div class="exchange-avatar">${otherInitials}</div>
                            <div class="exchange-info">
                                <div class="exchange-name">${escapeHtml(otherUser || 'User')}</div>
                                <div class="exchange-skill">${escapeHtml(ex.skill_name || 'Skill Exchange')}</div>
                                <div class="exchange-date">📅 ${formatDate(ex.scheduled_date)}</div>
                            </div>
                            <div><span class="status-badge ${getStatusClass(ex.status)}">${ex.status.toUpperCase()}</span></div>
                        </div>
                        ${actions}
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.handleUpdate = async function(exchangeId, status) {
            const success = await updateExchangeStatus(exchangeId, status);
            if (success) {
                showToast(`✅ Exchange ${status}!`);
                await renderExchanges();
            } else {
                showToast('❌ Failed to update exchange');
            }
        };

        function initStarRating() {
            document.querySelectorAll('#ratingStars .star').forEach(star => {
                star.onclick = function() {
                    selectedRating = parseInt(this.dataset.rating);
                    document.querySelectorAll('#ratingStars .star').forEach(s => {
                        if (parseInt(s.dataset.rating) <= selectedRating) {
                            s.classList.add('active');
                        } else {
                            s.classList.remove('active');
                        }
                    });
                };
            });
        }

        const observer = new MutationObserver(() => {
            const modal = document.getElementById('ratingModal');
            if (modal.classList.contains('show')) {
                setTimeout(initStarRating, 50);
            }
        });
        observer.observe(document.getElementById('ratingModal'), { attributes: true });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('navOverlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('show');
        }

        async function logout() {
            localStorage.removeItem('access_token');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }
            await renderExchanges();
            await updateUserAvatar();
            initStarRating();
        });

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
    </script>
    <script src="config.js"></script>
</body>

</html>
