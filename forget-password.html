<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="description" content="SkillSwap PH — Reset Password" />
    <title>SkillSwap PH — Reset Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet">
    <script src="global.js"></script>

    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --blue-primary: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-light: #eff6ff;
            --accent: #3b82f6;
            --text-dark: #0f172a;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --white: #ffffff;
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 20px;
        }

        .reset-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-mid);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .pin-input {
            text-align: center;
            letter-spacing: 6px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--blue-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--blue-dark);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #e2e8f0;
            color: var(--text-dark);
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-text {
            color: var(--red);
            font-size: 0.7rem;
            margin-top: 5px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        .success-text {
            color: var(--green);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-mid);
            font-size: 0.8rem;
            margin-bottom: 28px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--blue-primary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f172a;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <div id="toast"></div>

    <div class="reset-card">
        <!-- Step 1: Enter Email & PIN -->
        <div id="step1" class="step active">
            <h2>🔐 Reset Password</h2>
            <p class="subtitle">Enter your email and 4-digit PIN to verify your identity</p>

            <form id="verifyPinForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="you@example.com" required />
                    <p class="error-text" id="emailError">Enter a valid email</p>
                </div>

                <div class="input-group">
                    <label>Security PIN (4 digits)</label>
                    <input type="password" id="resetPin" placeholder="****" maxlength="4" class="pin-input" required />
                    <p class="error-text" id="pinError">PIN must be 4 digits</p>
                </div>

                <button type="submit" class="btn-primary" id="verifyBtn">Verify Identity</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Login</a>
            </div>
        </div>

        <!-- Step 2: Enter New Password -->
        <div id="step2" class="step">
            <h2>✏️ Create New Password</h2>
            <p class="subtitle">Enter your new password below</p>

            <form id="resetPasswordForm">
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Min 6 characters" required />
                    <p class="error-text" id="newPwError">Password must be at least 6 characters</p>
                </div>

                <div class="input-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm your password" required />
                    <p class="error-text" id="confirmPwError">Passwords don't match</p>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
                <button type="button" class="btn-secondary" onclick="goBackToStep1()">← Back</button>
            </form>
        </div>
    </div>

    <script>
        let verifiedEmail = null;
        let verifiedPin = null;

        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function goBackToStep1() {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            verifiedEmail = null;
            verifiedPin = null;
        }

        // Step 1: Verify PIN
        document.getElementById('verifyPinForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('resetEmail').value.trim();
            const pin = document.getElementById('resetPin').value.trim();

            const emailError = document.getElementById('emailError');
            const pinError = document.getElementById('pinError');

            emailError.classList.remove('show');
            pinError.classList.remove('show');

            let valid = true;
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.classList.add('show');
                valid = false;
            }
            if (!pin || !/^\d{4}$/.test(pin)) {
                pinError.classList.add('show');
                valid = false;
            }
            if (!valid) return;

            const btn = document.getElementById('verifyBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const response = await fetch(`${API_URL}/auth/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, pin })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Verification failed');
                }

                // Store verified info
                verifiedEmail = email;
                verifiedPin = pin;

                showToast('✅ PIN verified! Enter your new password.');

                // Move to step 2
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                
                // Clear password fields
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';

            } catch (err) {
                showToast('❌ ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Step 2: Reset Password
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            const newPwError = document.getElementById('newPwError');
            const confirmPwError = document.getElementById('confirmPwError');

            newPwError.classList.remove('show');
            confirmPwError.classList.remove('show');

            let valid = true;
            if (!newPassword || newPassword.length < 6) {
                newPwError.classList.add('show');
                valid = false;
            }
            if (newPassword !== confirmPassword) {
                confirmPwError.classList.add('show');
                valid = false;
            }
            if (!valid) return;

            if (!verifiedEmail || !verifiedPin) {
                showToast('❌ Session expired. Please start over.');
                goBackToStep1();
                return;
            }

            const btn = document.getElementById('resetBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: verifiedEmail, 
                        pin: verifiedPin, 
                        new_password: newPassword 
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Password reset failed');
                }

                showToast('✅ Password reset successful! Please login with your new password.');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (err) {
                showToast('❌ ' + err.message);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
    <script src="config.js"></script>
</body>

</html>
